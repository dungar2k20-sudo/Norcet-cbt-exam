[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/questions.json"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/script.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/questions.js"
  [headers.values]
    Cache-Control = "no-cache"
